name: Build and Publish

on:
  push:
    branches:
      - gitea
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: linux-x64
    container:
      image: archlinux:latest
    steps:
      - name: Update system
        run: |
          pacman -Syu --noconfirm

      - name: Install dependencies
        run: |
          pacman -S --noconfirm git hugo openssh

      - name: Setup SSH trust and keys
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          # Trust the git server
          ssh-keyscan -p 2222 -t rsa git.r3r4um.online >> ~/.ssh/known_hosts 2>/dev/null || true
          
          # Add deploy key
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Clone and build
        run: |
          REPO_URL="ssh://git@git.r3r4um.online:2222/maurerit/maurerit.r3r4um.online.git"
          WORK_DIR="/tmp/blog-build"
          
          rm -rf "$WORK_DIR"
          mkdir -p "$WORK_DIR"
          cd "$WORK_DIR"
          
          git clone -b gitea "$REPO_URL" repo
          cd repo
          git config user.email "workflow@r3r4um.online"
          git config user.name "Build Workflow"
          
          echo "Building Hugo site..."
          hugo --gc --minify --baseURL "https://maurerit.r3r4um.online/"
          echo "Build complete"
          
          cp -r public "$WORK_DIR/public-built"

      - name: Publish to publish branch
        run: |
          REPO_URL="ssh://git@git.r3r4um.online:2222/maurerit/maurerit.r3r4um.online.git"
          WORK_DIR="/tmp/blog-build"
          
          cd "$WORK_DIR/repo"
          
          git fetch origin publish
          git checkout -B publish origin/publish
          
          find . -mindepth 1 -not -path './.git*' -delete
          cp -r "$WORK_DIR/public-built"/* .
          
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "build: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push -u origin publish
          fi
