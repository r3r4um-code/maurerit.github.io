name: Build and Publish

on:
  push:
    branches:
      - gitea
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: linux-x64
    container:
      image: archlinux:latest
    steps:
      - name: Update system
        run: |
          pacman -Syu --noconfirm

      - name: Install dependencies
        run: |
          pacman -S --noconfirm git hugo openssh

      - name: Setup SSH trust and keys
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          # Trust the git server
          ssh-keyscan -p 2222 -t rsa git.r3r4um.online >> ~/.ssh/known_hosts 2>/dev/null || true
          
          # Add deploy key
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Clone repo
        run: |
          REPO_URL="ssh://git@git.r3r4um.online:2222/maurerit/maurerit.r3r4um.online.git"
          WORK_DIR="/tmp/blog-build"
          
          rm -rf "$WORK_DIR"
          mkdir -p "$WORK_DIR"
          cd "$WORK_DIR"
          
          git clone -b gitea "$REPO_URL" repo
          cd repo
          git config user.email "workflow@r3r4um.online"
          git config user.name "Build Workflow"

      - name: Build for HTTPS (matt.r3r4um.dev)
        run: |
          WORK_DIR="/tmp/blog-build"
          
          cd "$WORK_DIR/repo"
          
          echo "Building Hugo site for matt.r3r4um.dev..."
          hugo --gc --minify --baseURL "https://matt.r3r4um.dev/"
          echo "Build complete"
          
          cp -r public "$WORK_DIR/public-https"

      - name: Build for I2P (d2mzdfz3woh544zahl76mn4h2ajumxetlj3wxctgd4ximyjytrxa.b32.i2p)
        run: |
          WORK_DIR="/tmp/blog-build"
          
          cd "$WORK_DIR/repo"
          
          echo "Building Hugo site for I2P..."
          hugo --gc --minify --baseURL "http://d2mzdfz3woh544zahl76mn4h2ajumxetlj3wxctgd4ximyjytrxa.b32.i2p/"
          echo "Build complete"
          
          cp -r public "$WORK_DIR/public-i2p"

      - name: Publish to publish branch (HTTPS)
        run: |
          REPO_URL="ssh://git@git.r3r4um.online:2222/maurerit/maurerit.r3r4um.online.git"
          WORK_DIR="/tmp/blog-build"
          
          cd "$WORK_DIR/repo"
          
          git fetch origin publish
          git checkout -B publish origin/publish
          
          find . -mindepth 1 -not -path './.git*' -delete
          cp -r "$WORK_DIR/public-https"/* .
          
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "build: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push -u origin publish
          fi

      - name: Publish to i2ppublish branch (I2P)
        run: |
          REPO_URL="ssh://git@git.r3r4um.online:2222/maurerit/maurerit.r3r4um.online.git"
          WORK_DIR="/tmp/blog-build"
          
          cd "$WORK_DIR/repo"
          
          git fetch origin i2ppublish || true
          git checkout -B i2ppublish origin/i2ppublish || git checkout --orphan i2ppublish
          
          find . -mindepth 1 -not -path './.git*' -delete
          cp -r "$WORK_DIR/public-i2p"/* .
          
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "build: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push -u origin i2ppublish
          fi
